<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영문 문서 한국어 번역</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="bg-shapes" aria-hidden="true">
    <span class="shape shape-1"></span>
    <span class="shape shape-2"></span>
    <span class="shape shape-3"></span>
  </div>

  <div class="app">
    <header class="header">
      <div class="logo-wrap">
        <span class="logo">EN</span>
        <span class="logo-arrow">→</span>
        <span class="logo logo-ko">한</span>
      </div>
      <h1>영문 문서 <em>한국어 번역</em></h1>
      <p class="subtitle">텍스트 파일을 올리면 한국어로 번역하고, 3줄 요약을 음성으로 들려 드립니다</p>
    </header>

    <main class="main">
      <section class="card upload-card">
        <h2 class="card-title">
          <span class="card-icon">📁</span>
          파일 업로드
        </h2>

        <div class="dropzone" id="dropzone">
          <input type="file" id="fileInput" accept=".txt,.docx" hidden>
          <div class="dropzone-content">
            <div class="drop-illustration">📄</div>
            <p class="drop-title">여기에 파일을 끌어다 놓으세요</p>
            <p class="drop-sub">또는 클릭해서 선택 · <strong>.txt</strong>, <strong>.docx</strong></p>
          </div>
          <p class="selected-file" id="fileName"></p>
        </div>

        <div class="options">
          <label class="option-label" for="sourceLang">원문 언어</label>
          <select id="sourceLang">
            <option value="en" selected>영어 (English)</option>
            <option value="auto">자동 감지</option>
          </select>
        </div>

        <button type="button" class="btn-translate" id="translateBtn">
          한국어로 번역하기
        </button>
      </section>

      <section class="card result-card">
        <div class="result-top">
          <h2 class="card-title">
            <span class="card-icon">✨</span>
            번역 결과
          </h2>
          <div class="result-btns">
            <button type="button" class="btn-secondary" id="copyBtn" disabled>복사</button>
            <button type="button" class="btn-secondary btn-accent" id="downloadBtn" disabled>저장</button>
          </div>
        </div>
        <div class="result-box" id="resultBody">
          <p class="empty-msg">번역이 완료되면 한국어 문장이 이곳에 표시됩니다.</p>
        </div>
        <p class="status-line" id="statusMsg"></p>
      </section>

      <section class="card summary-card" id="summaryCard" hidden>
        <div class="summary-top">
          <h2 class="card-title">
            <span class="card-icon">📝</span>
            3줄 요약
          </h2>
          <div class="tts-controls">
            <button type="button" class="btn-tts" id="playTtsBtn" disabled>
              <span class="tts-icon">🔊</span> 다시 듣기
            </button>
            <button type="button" class="btn-tts btn-stop" id="stopTtsBtn" disabled>정지</button>
          </div>
        </div>
        <div class="summary-box" id="summaryBody">
          <p class="empty-msg">요약을 생성하는 중...</p>
        </div>
        <p class="tts-status" id="ttsStatus"></p>
      </section>
    </main>

    <footer class="footer">
      <p>Gemini 2.5 Flash 요약 · Google Translate 번역</p>
    </footer>
  </div>

  <div class="toast" id="toast" role="status"></div>
  <script>
    window.TRANSLATE_CONFIG = { source: "en", target: "ko" };
  </script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
